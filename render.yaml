services:
  - type: web
    name: kisan-ai-backend
    env: docker
    dockerfilePath: server/Dockerfile
    dockerContext: server
    plan: free
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kisan-db-prod
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: "*"

databases:
  - name: kisan-db-prod
    plan: free
    databaseName: kisan_db
